<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear lovely Zoey 💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            overflow: hidden;
            position: relative;
        }

        /* Hiệu ứng trái tim bay */
        .heart-pop {
            position: absolute;
            font-size: 20px;
            color: #ff4d6d;
            animation: fly 4s linear infinite;
            bottom: -50px;
            opacity: 0;
            z-index: 1;
        }

        @keyframes fly {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-105vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Hộp nội dung chính */
        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            border: 2px solid #fff;
            transition: all 0.5s ease;
        }

        .gif-img {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Khu vực nút bấm */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #btnYes {
            background-color: #ff4d6d;
            color: white;
        }

        #btnYes:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        #btnNo {
            background-color: #6c757d;
            color: white;
            position: absolute;
            transition: left 0.1s ease, top 0.1s ease; /* Tạo hiệu ứng nảy mượt mà */
        }

        /* Màn hình chúc mừng */
        .hidden {
            display: none;
        }

        .celebrate h1 {
            font-size: 28px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div style="position: absolute; visibility: hidden; width: 0; height: 0;">
        <div id="youtubePlayer"></div>
    </div>

    <div class="container" id="questionBox">
        <img class="gif-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B0b2I0cmN5b3V6bXN0MnB5bWZ0d3V0eTl6bW9xdmtqOHBvNHZjdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute Bear">
        <h1 id="mainText">Will you go on a date with me tomorrow?<br>Saying no is not an option, my lovely Zoey 💖</h1>
        <p>Think carefully, beautiful...</p>
        
        <div class="btn-group">
            <button class="btn" id="btnYes" onclick="selectYes()">Yes, I'd love to! 🥰</button>
            <button class="btn" id="btnNo" onmouseover="moveButton()">No wayyyy!? 😜</button>
        </div>
    </div>

    <div class="container hidden" id="celebrateBox">
        <img class="gif-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbGFhOHBteXNrN3Q3YXF4OXE1MmFubW9vMzgxMGs2dmdmZG4zZGYzOSZlcD12MV9naWZzX3RyZW5kaW5nJmN0PWc/fUQ4rhUZJYiQsas6WD/giphy.gif" alt="Happy Bear">
        <h1>Yayyyy! See you tomorrow sweetie :3</h1>
        <p>Can't wait to see your beautiful smile :>></p>
    </div>

    <script>
        let player;
        
        // Cấu hình trình phát nhạc ngầm từ link YouTube bạn gửi
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtubePlayer', {
                videoId: 'GhQxrCrVSyw', // ID chuẩn bài Until I Found You bản Lyrics bạn gửi
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'GhQxrCrVSyw'
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // Hàm ép trình duyệt bật tiếng và phát nhạc khi có tương tác (bấm/chạm)
        function forcePlayMusic() {
            if (player && typeof player.playVideo === 'function') {
                player.unMute();
                player.setVolume(100);
                player.playVideo();
                // Gỡ bỏ sự kiện sau khi kích hoạt thành công
                document.removeEventListener('click', forcePlayMusic);
                document.removeEventListener('touchstart', forcePlayMusic);
            }
        }
        document.addEventListener('click', forcePlayMusic);
        document.addEventListener('touchstart', forcePlayMusic);

        // Tạo hiệu ứng trái tim bay
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-pop');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 2 + 3 + "s";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
        setInterval(createHeart, 300);

        // Hàm làm nút "Không" chạy trốn TRONG VÙNG GIỚI HẠN AN TOÀN
        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            
            // Thiết lập khoảng cách an toàn so với mép màn hình (tránh bị tràn, mất góc)
            const padding = 50; 
            
            // Tính toán vùng giới hạn theo chiều ngang (X)
            const minX = padding;
            const maxX = window.innerWidth - btnNo.offsetWidth - padding;
            
            // Tính toán vùng giới hạn theo chiều dọc (Y) - Chỉ cho chạy ở nửa dưới màn hình
            const minY = window.innerHeight * 0.45; 
            const maxY = window.innerHeight - btnNo.offsetHeight - padding;
            
            // Tạo tọa độ ngẫu nhiên nằm chuẩn trong khung an toàn
            let randomX = minX + Math.random() * (maxX - minX);
            let randomY = minY + Math.random() * (maxY - minY);
            
            // Chống lỗi tọa độ bị âm hoặc vượt quá giới hạn trên các thiết bị siêu nhỏ
            randomX = Math.max(minX, Math.min(randomX, maxX));
            randomY = Math.max(minY, Math.min(randomY, maxY));
            
            // Gán vị trí mới dạng fixed để không bị ảnh hưởng bởi cấu trúc thẻ cha
            btnNo.style.position = 'fixed';
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // Hỗ trợ điện thoại khi cố ấn hoặc chạm hụt nút "No"
        document.getElementById('btnNo').addEventListener('touchstart', function(e) {
            e.preventDefault();
            moveButton();
            forcePlayMusic(); // Kích hoạt nhạc luôn khi chạm hụt
        });

        // Hàm xử lý khi bấm nút "Có"
        function selectYes() {
            document.getElementById('questionBox').classList.add('hidden');
            document.getElementById('celebrateBox').classList.remove('hidden');
            
            // Đảm bảo nhạc chắc chắn bật tiếng khi bấm Yes
            if (player) {
                player.unMute();
                player.setVolume(100);
                player.playVideo();
            }
            
            for(let i=0; i<30; i++) {
                setTimeout(createHeart, i * 50);
            }
        }
    </script>
</body>
</html>
