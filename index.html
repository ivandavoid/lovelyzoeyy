<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear lovely Zoey 💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            overflow: hidden;
            position: relative;
        }

        /* Hiệu ứng trái tim bay */
        .heart-pop {
            position: absolute;
            font-size: 20px;
            color: #ff4d6d;
            animation: fly 4s linear infinite;
            bottom: -50px;
            opacity: 0;
            z-index: 1;
        }

        @keyframes fly {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-105vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Hộp nội dung chính */
        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            border: 2px solid #fff;
            transition: all 0.5s ease;
        }

        .gif-img {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Khu vực nút bấm */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #btnYes {
            background-color: #ff4d6d;
            color: white;
        }

        #btnYes:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        #btnNo {
            background-color: #6c757d;
            color: white;
            position: absolute;
            transition: left 0.1s ease, top 0.1s ease;
        }

        /* Màn hình chúc mừng */
        .hidden {
            display: none;
        }

        .celebrate h1 {
            font-size: 28px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div id="musicContainer" style="position: absolute; left: -9999px; top: -9999px; width: 1px; height: 1px; overflow: hidden;">
        </div>

    <div class="container" id="questionBox">
        <img class="gif-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3B0b2I0cmN5b3V6bXN0MnB5bWZ0d3V0eTl6bW9xdmtqOHBvNHZjdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute Bear">
        <h1 id="mainText">Will you go on a date with me tomorrow?<br>Saying no is not an option, my lovely Zoey 💖</h1>
        <p>Think carefully, beautiful...</p>
        
        <div class="btn-group">
            <button class="btn" id="btnYes" onclick="selectYes()">Yes, I'd love to! 🥰</button>
            <button class="btn" id="btnNo" onmouseover="moveButton()">No wayyyy!? 😜</button>
        </div>
    </div>

    <div class="container hidden" id="celebrateBox">
        <img class="gif-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbGFhOHBteXNrN3Q3YXF4OXE1MmFubW9vMzgxMGs2dmdmZG4zZGYzOSZlcD12MV9naWZzX3RyZW5kaW5nJmN0PWc/fUQ4rhUZJYiQsas6WD/giphy.gif" alt="Happy Bear">
        <h1>Yayyyy! See you tomorrow sweetie :3</h1>
        <p>Can't wait to see your beautiful smile :>></p>
    </div>

    <script>
        let musicStarted = false;

        // Hàm chèn nhạc thông minh bằng cách tiêm Iframe ẩn sâu, chặn tính năng mở toàn màn hình (playsinline=1)
        function forcePlayMusic() {
            if (musicStarted) return;
            
            const container = document.getElementById('musicContainer');
            // Cấu hình mã nhúng chống bung màn hình trên điện thoại
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/GhQxrCrVSyw?autoplay=1&mute=0&loop=1&playlist=GhQxrCrVSyw&playsinline=1&controls=0&disablekb=1&fs=0" allow="autoplay"></iframe>`;
            
            musicStarted = true;
            
            // Gỡ bỏ sự kiện sau khi kích hoạt thành công
            document.removeEventListener('click', forcePlayMusic);
            document.removeEventListener('touchstart', forcePlayMusic);
        }

        // Kích hoạt nhạc khi chạm bất kỳ đâu ngoài màn hình
        document.addEventListener('click', forcePlayMusic);
        document.addEventListener('touchstart', forcePlayMusic);

        // Tạo hiệu ứng trái tim bay
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-pop');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 2 + 3 + "s";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
        setInterval(createHeart, 300);

        // Hàm làm nút "Không" chạy trốn TRONG VÙNG GIỚI HẠN AN TOÀN
        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            const padding = 50; 
            
            const minX = padding;
            const maxX = window.innerWidth - btnNo.offsetWidth - padding;
            
            const minY = window.innerHeight * 0.45; 
            const maxY = window.innerHeight - btnNo.offsetHeight - padding;
            
            let randomX = minX + Math.random() * (maxX - minX);
            let randomY = minY + Math.random() * (maxY - minY);
            
            randomX = Math.max(minX, Math.min(randomX, maxX));
            randomY = Math.max(minY, Math.min(randomY, maxY));
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // Hỗ trợ điện thoại khi cố chạm hoặc bấm nút "No"
        document.getElementById('btnNo').addEventListener('touchstart', function(e) {
            e.preventDefault(); // Ngăn trình duyệt kích hoạt hiệu ứng click ảo gây bung video
            moveButton();       // Di chuyển nút đi nơi khác ngay lập tức
            forcePlayMusic();   // Phát nhạc ngầm
        });

        // Hàm xử lý khi bấm nút "Có"
        function selectYes() {
            document.getElementById('questionBox').classList.add('hidden');
            document.getElementById('celebrateBox').classList.remove('hidden');
            
            forcePlayMusic(); // Chắc chắn nhạc sẽ phát khi đồng ý
            
            for(let i=0; i<30; i++) {
                setTimeout(createHeart, i * 50);
            }
        }
    </script>
</body>
</html>
